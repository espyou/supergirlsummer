async function loadData(userId) {
  try {
    const { data } = await db.from('progress').select('data').eq('user_id', userId).maybeSingle();
    return data?.data || {};
  } catch { return {}; }
}

async function saveData(userId, d) {
  try {
    const { data: existing } = await db.from('progress').select('id').eq('user_id', userId).maybeSingle();
    if (existing) {
      await db.from('progress').update({ data: d, updated_at: new Date().toISOString() }).eq('user_id', userId);
    } else {
      await db.from('progress').insert({ user_id: userId, data: d });
    }
  } catch {}
}

            <div style={{ fontFamily:font.display, fontSize:16, letterSpacing:"0.06em", color, marginBottom:4, marginTop:20 }}>{phase}</div>
            <div style={{ fontSize:12, color:C.dim, marginBottom:8 }}>{meta}</div>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, border:`1px solid ${C.border}` }}>
              <THead cols={["Station","You","Her","Rest"]} />
              <tbody>
                {rows.map(([st,y,h,r])=>{
                  const yName = y.replace(/ x\d+| \(.*\)/g,"");
                  const hName = h.replace(/ x\d+/g,"");
                  const yReps = y.match(/x\d+/)?.[0]||"";
                  const hReps = h.match(/x\d+/)?.[0]||"";
                  const yExtra = y.includes("heavier")?" (heavier)":y.includes("heaviest")?" (heaviest)":"";
                  return (
                    <tr key={st} style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"8px 12px", color:C.white, fontWeight:600 }}>{st}</td>
                      <td style={{ padding:"8px 12px", color:C.muted }}><ExBtn name={yName} onClick={onEx}/><span style={{ color:C.dim }}> {yReps}{yExtra}</span></td>
                      <td style={{ padding:"8px 12px", color:C.muted }}><ExBtn name={hName} onClick={onEx}/><span style={{ color:C.dim }}> {hReps}</span></td>
                      <td style={{ padding:"8px 12px", color:C.dim, fontSize:11 }}>{r}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {finisher && (
              <div style={{ background:"rgba(232,196,74,0.08)", border:`1px solid rgba(232,196,74,0.2)`, borderLeft:`4px solid ${C.gold}`, padding:"12px 16px", marginTop:6, fontSize:12 }}>
                <span style={{ fontWeight:700, color:C.goldLight }}>Her tryout finisher (after circuit): </span>
                <span style={{ color:C.muted }}>{finisher}</span>
              </div>
            )}
          </div>
        ))}
        <Block time="38-45 min" tag="both" title="Cool-Down + Nordics">
          <div>Together: Static stretch 3 min</div>
          <div style={{ marginTop:8 }}><Tag type="you">YOU ONLY</Tag> <ExBtn name="Nordic Hamstring Curl" onClick={onEx}/> — same prescription as Monday. Phase 1-2: 2x5 · Phase 3-4: 3x5</div>
        </Block>
      </div>

      <div style={{ marginBottom:40 }}>
        <SectionHeader label="Tuesday + Thursday" title="SOCCER DAYS" />
        <p style={{ fontSize:13, color:C.muted, marginBottom:20, lineHeight:1.6 }}>Play-based. Keep it fun. Pick 1-2 per session and let her lead the energy.</p>
        {[
          { phase:"Phase 1 — Foundation (Wks 1-3)", drills:[
            { name:"Gates Dribbling", desc:"6-8 mini gates (cones 1m apart) randomly placed across half field. Dribble through as many as possible in 60 sec. You count and reset." },
            { name:"Shadow Dribbling", desc:"She dribbles and mirrors your movement exactly. Builds body awareness and ball-eye coordination without any pressure." },
          ]},
          { phase:"Phase 2 — 1v1 Introduction (Wks 4-6)", drills:[
            { name:"Shark Attack", desc:"She dribbles in a 15x15m grid while you try to knock her ball out (go easy). Builds ball protection and awareness under pressure." },
            { name:"1v1 to Small Goals", desc:"Two 2m goals 15m apart. Straight 1v1. Keep games to 3 min with rest. Track wins loosely." },
          ]},
          { phase:"Phase 3 — Positional Awareness (Wks 7-9)", drills:[
            { name:"Directional Rondo", desc:"You serve balls from different positions. She receives, turns, and plays to a target cone in a specific zone. Simulates receiving under positional pressure." },
            { name:"Channel Game", desc:"Field split into 3 vertical channels. She must receive and move ball into the correct channel based on your calls. Builds scanning and decision speed." },
          ]},
          { phase:"Phase 4 — Tryout Simulation (Wks 10-12)", drills:[
            { name:"1v1 Gauntlet", desc:"5 consecutive 1v1 reps, 30 sec each, minimal rest. Simulates tryout fatigue and competitive pressure." },
            { name:"Decision Dribbling", desc:"You call a color/number cone as she approaches — she must react and change direction instantly. Builds the read-and-react skill evaluators look for." },
          ]},
        ].map(({ phase, drills })=>(
          <div key={phase} style={{ marginBottom:20 }}>
            <div style={{ fontFamily:font.display, fontSize:18, color:C.gold, letterSpacing:"0.05em", marginBottom:8 }}>{phase}</div>
            {drills.map(d=>(
              <div key={d.name} style={{ background:C.card, padding:"12px 16px", marginBottom:2, display:"flex", gap:14, flexWrap:"wrap" }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.white, minWidth:160 }}>{d.name}</div>
                <div style={{ fontSize:12, color:C.muted, lineHeight:1.55, flex:1 }}>{d.desc}</div>
              </div>
            ))}
          </div>
        ))}
      </div>

      <div style={{ marginBottom:40 }}>
        <SectionHeader label="Address Before Week 1" title="KNOWN UNKNOWNS" />
        {ALERTS.map((a,i)=>(
          <div key={i} style={{ background:a.type==="warn"?"rgba(196,30,42,0.1)":"rgba(232,196,74,0.07)", border:`1px solid ${a.type==="warn"?"rgba(196,30,42,0.3)":"rgba(232,196,74,0.2)"}`, borderLeft:`4px solid ${a.type==="warn"?C.red:C.gold}`, padding:"13px 18px", marginBottom:8, fontSize:13 }}>
            <span style={{ fontWeight:700, color:a.type==="warn"?C.redLight:C.goldLight }}>{a.title}. </span>
            <span style={{ color:"rgba(220,228,255,0.8)" }}>{a.body}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ProgressTab({ data, onDataChange, onSave }) {
  const [week, setWeek] = useState(1);
  const [entries, setEntries] = useState(()=>data[`w${week}`]||{});
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(false);

  useEffect(()=>{ setEntries(data[`w${week}`]||{}); }, [week, data]);

  const handleChange = (id, who, val) => {
    const next = {...entries,[`${id}_${who}`]:val};
    setEntries(next);
    setSaved(false);
    onDataChange({...data,[`w${week}`]:next});
  };

  const handleSave = async () => {
    setLoading(true);
    await onSave({...data,[`w${week}`]:entries});
    setLoading(false);
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  const getDelta = (metricId, who) => {
    const cur = parseFloat(data[`w${week}`]?.[`${metricId}_${who}`]);
    const prevWeek = [...RETEST_WEEKS].reverse().find(w=>w<week);
    if (!prevWeek) return null;
    const prev = parseFloat(data[`w${prevWeek}`]?.[`${metricId}_${who}`]);
    if (isNaN(cur)||isNaN(prev)||prev===0) return null;
    return { delta:cur-prev, prev };
  };

  const renderGroup = (whoFilter, label, accent) => {
    const metrics = METRICS.filter(m=>m.who==="both"||m.who===whoFilter);
    return (
      <div style={{ marginBottom:28 }}>
        <div style={{ fontFamily:font.display, fontSize:20, letterSpacing:"0.05em", color:accent, marginBottom:12, paddingBottom:10, borderBottom:`1px solid ${C.border}` }}>{label}</div>
        {metrics.map(m=>{
          const key = `${m.id}_${whoFilter}`;
          const val = entries[key]||"";
          const result = getDelta(m.id,whoFilter);
          const improved = result&&(m.lower?result.delta<0:result.delta>0);
          const worsened = result&&(m.lower?result.delta>0:result.delta<0);
          const pct = result?Math.abs((result.delta/result.prev)*100).toFixed(1):null;
          return (
            <div key={m.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6, padding:"10px 14px", background:C.card, borderLeft:`3px solid ${accent}` }}>
              <div style={{ flex:1, fontSize:13, color:C.white, fontWeight:500 }}>{m.label}</div>
              <input type="number" step="0.01" placeholder="—" value={val}
                onChange={e=>handleChange(m.id,whoFilter,e.target.value)}
                style={{ width:80, background:"#05080f", border:`1px solid #1a2035`, color:C.white, padding:"6px 10px", fontSize:14, fontFamily:font.body, borderRadius:2, textAlign:"right", outline:"none" }}
              />
              <div style={{ fontSize:11, color:C.dim, width:32 }}>{m.unit}</div>
              {result!==null?(
                <div style={{ width:72, fontSize:11, textAlign:"right", color:improved?C.blueLight:worsened?C.redLight:C.dim, fontWeight:600 }}>
                  {improved?"up":worsened?"dn":"-"} {pct}%
                </div>
              ):<div style={{ width:72 }}/>}
            </div>
          );
        })}
      </div>
    );
  };

  const hasAnyData = RETEST_WEEKS.some(w=>data[`w${w}`]&&Object.values(data[`w${w}`]).some(v=>v!==""));

  return (
    <div>
      <SectionHeader label="Track Progress" title="MEASUREMENTS" />
      <p style={{ fontSize:13, color:C.muted, marginBottom:20, lineHeight:1.6 }}>Record baseline Week 1. Re-test at start of each new phase. Deltas appear automatically once you have two data points.</p>
      <div style={{ marginBottom:28 }}>
        <div style={{ fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase", color:"#444", marginBottom:10 }}>Select Test Week</div>
        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
          {RETEST_WEEKS.map(w=>{
            const hasData = !!(data[`w${w}`]&&Object.values(data[`w${w}`]).some(v=>v!==""));
            return (
              <button key={w} onClick={()=>setWeek(w)} style={{
                padding:"8px 14px", background:week===w?C.blue:C.card,
                border:`1px solid ${week===w?C.blue:C.border}`,
                color:week===w?C.white:hasData?C.blueLight:"#555",
                cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:font.body, borderRadius:2, position:"relative",
              }}>
                {w===1?"Wk 1 — Baseline":w===12?"Wk 12 — Peak":`Week ${w}`}
                {hasData&&week!==w&&<span style={{ position:"absolute", top:4, right:4, width:5, height:5, borderRadius:"50%", background:C.gold }}/>}
              </button>
            );
          })}
        </div>
      </div>
      {renderGroup("you","YOUR METRICS",C.blue)}
      {renderGroup("her","HER METRICS",C.gold)}
      <div style={{ display:"flex", alignItems:"center", gap:14, marginTop:8, marginBottom:40 }}>
        <button onClick={handleSave} disabled={loading} style={{
          background:saved?"#1a3a8f":"#0d1a3a", border:`1px solid ${saved?C.blue:"#1a2a5a"}`,
          color:saved?C.white:C.blueLight, padding:"10px 24px", fontSize:13, fontWeight:700,
          fontFamily:font.body, cursor:"pointer", borderRadius:2, letterSpacing:"0.1em",
          textTransform:"uppercase", transition:"all 0.2s",
        }}>
          {loading?"Saving...":saved?"Saved ✓":"Save Results"}
        </button>
        {week>1&&<span style={{ fontSize:12, color:C.dim }}>Deltas compare to previous test week</span>}
      </div>
      {hasAnyData&&(
        <div>
          <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", color:C.gold, marginBottom:16 }}>Progress Charts</div>
          {METRICS.slice(0,4).map(m=>{
            const points = RETEST_WEEKS.map(w=>{
              const yv = parseFloat(data[`w${w}`]?.[`${m.id}_you`]);
              const hv = parseFloat(data[`w${w}`]?.[`${m.id}_her`]);
              return { w, you:isNaN(yv)?null:yv, her:isNaN(hv)?null:hv };
            }).filter(p=>p.you!==null||p.her!==null);
            if (points.length<2) return null;
            const allVals = points.flatMap(p=>[p.you,p.her]).filter(v=>v!==null);
            const min=Math.min(...allVals), max=Math.max(...allVals), range=max-min||1;
            const W=260, H=60;
            const px=w=>((RETEST_WEEKS.indexOf(w))/(RETEST_WEEKS.length-1))*W;
            const py=v=>H-((v-min)/range*H*0.8)-H*0.1;
            const makePath=key=>{
              const valid=points.filter(p=>p[key]!==null);
              if (valid.length<2) return "";
              return valid.map((p,i)=>`${i===0?"M":"L"}${px(p.w)},${py(p[key])}`).join(" ");
            };
            return (
              <div key={m.id} style={{ background:C.card, padding:"14px 18px", marginBottom:6, display:"flex", alignItems:"center", gap:20, flexWrap:"wrap" }}>
                <div style={{ fontSize:12, fontWeight:600, color:C.white, width:120, flexShrink:0 }}>{m.label}</div>
                <svg width={W} height={H} style={{ overflow:"visible", flexShrink:0 }}>
                  {RETEST_WEEKS.map(w=><line key={w} x1={px(w)} x2={px(w)} y1={0} y2={H} stroke="#1a2035" strokeWidth={1}/>)}
                  {makePath("you")&&<path d={makePath("you")} fill="none" stroke={C.blueLight} strokeWidth={2}/>}
                  {makePath("her")&&<path d={makePath("her")} fill="none" stroke={C.goldLight} strokeWidth={2} strokeDasharray="4 2"/>}
                  {points.map(p=>p.you!==null&&<circle key={`y${p.w}`} cx={px(p.w)} cy={py(p.you)} r={3} fill={C.blueLight}/>)}
                  {points.map(p=>p.her!==null&&<circle key={`h${p.w}`} cx={px(p.w)} cy={py(p.her)} r={3} fill={C.goldLight}/>)}
                </svg>
                <div style={{ fontSize:11, color:C.dim }}>
                  <div style={{ color:C.blueLight, marginBottom:2 }}>— You</div>
                  <div style={{ color:C.goldLight }}>--- Her</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setLoading(true);
    setError('');
    const { error } = mode === 'login'
      ? await db.auth.signInWithPassword({ email, password })
      : await db.auth.signUp({ email, password });
    if (error) setError(error.message);
    setLoading(false);
  };

  return (
    <div style={{ background:C.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:font.body }}>
      <div style={{ width:'100%', maxWidth:360, padding:'0 24px' }}>
        <div style={{ fontFamily:font.display, fontSize:52, color:C.white, lineHeight:0.9, marginBottom:4 }}>SUPERGIRL</div>
        <div style={{ fontFamily:font.display, fontSize:52, color:C.gold, lineHeight:0.9, marginBottom:36 }}>SUMMER</div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase', color:C.dim, marginBottom:6 }}>Email</div>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            style={{ width:'100%', background:C.card, border:`1px solid ${C.border}`, color:C.white, padding:'10px 14px', fontSize:14, fontFamily:font.body, borderRadius:2, outline:'none' }}
          />
        </div>
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase', color:C.dim, marginBottom:6 }}>Password</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
            style={{ width:'100%', background:C.card, border:`1px solid ${C.border}`, color:C.white, padding:'10px 14px', fontSize:14, fontFamily:font.body, borderRadius:2, outline:'none' }}
          />
        </div>
        {error&&<div style={{ fontSize:12, color:C.redLight, marginBottom:14 }}>{error}</div>}
        <button onClick={handleSubmit} disabled={loading} style={{
          width:'100%', background:C.blue, border:'none', color:C.white,
          padding:'12px', fontSize:13, fontWeight:700, fontFamily:font.body,
          cursor:'pointer', borderRadius:2, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:14,
        }}>
          {loading?'...' : mode==='login'?'Log In':'Create Account'}
        </button>
        <button onClick={()=>{setMode(mode==='login'?'signup':'login');setError('');}} style={{
          background:'none', border:'none', color:C.dim, fontSize:12, cursor:'pointer', fontFamily:font.body, width:'100%', textAlign:'center',
        }}>
          {mode==='login'?"Don't have an account? Sign up":"Already have an account? Log in"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(undefined);
  const [tab, setTab] = useState('plan');
  const [modal, setModal] = useState(null);
  const [data, setData] = useState({});

  useEffect(()=>{
    db.auth.getSession().then(({ data: { session } })=>{
      setSession(session||null);
      if (session) loadData(session.user.id).then(d=>setData(d||{}));
    });
    const { data: { subscription } } = db.auth.onAuthStateChange(async (event, session)=>{
      setSession(session||null);
      if (session) { const d = await loadData(session.user.id); setData(d||{}); }
      else setData({});
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const handleDataChange = (newData) => setData(newData);
  const handleSave = async (newData) => {
    setData(newData);
    if (session) await saveData(session.user.id, newData);
  };

  if (session===undefined) return (
    <div style={{ background:C.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ color:C.dim, fontSize:13, letterSpacing:'0.1em' }}>Loading...</div>
    </div>
  );

  if (!session) return <LoginScreen />;

  return (
    <div style={{ background:C.bg, minHeight:"100vh", fontFamily:font.body, color:C.white }}>
      <div style={{ background:"linear-gradient(135deg, #0a0d1f 0%, #12183a 40%, #2a0a10 100%)", padding:"48px 28px 40px", borderBottom:`3px solid ${C.gold}`, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.025) 39px,rgba(255,255,255,0.025) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.025) 39px,rgba(255,255,255,0.025) 40px)", pointerEvents:"none" }}/>
        <div style={{ maxWidth:800, margin:"0 auto", position:"relative" }}>
          <div style={{ fontSize:10, letterSpacing:"0.3em", textTransform:"uppercase", color:C.goldLight, marginBottom:12, opacity:0.85 }}>12-Week Training Program · Father + Daughter</div>
          <div style={{ fontFamily:font.display, fontSize:"clamp(52px,11vw,100px)", lineHeight:0.88, letterSpacing:"0.02em", marginBottom:8 }}>
            SUPERGIRL<br/><span style={{ color:C.gold }}>SUMMER</span>
          </div>
          <div style={{ fontSize:13, color:"rgba(220,228,255,0.4)", letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:24, fontWeight:300 }}>Speed · Power · Soccer</div>
          <div style={{ display:"flex", gap:28, flexWrap:"wrap" }}>
            {[["12","Weeks"],["3","Structured Days/Wk"],["2","Soccer Days/Wk"],["45","Min/Session"],["WK12","Peak/Tryout"]].map(([v,l])=>(
              <div key={l}>
                <div style={{ fontFamily:font.display, fontSize:26, color:C.gold, lineHeight:1 }}>{v}</div>
                <div style={{ fontSize:10, letterSpacing:"0.12em", textTransform:"uppercase", color:"rgba(220,228,255,0.4)", marginTop:2 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ background:"#080c18", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:800, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ display:"flex" }}>
            {[{id:"plan",label:"Training Plan"},{id:"progress",label:"Track Progress"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"14px 20px", background:"none", border:"none",
                borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,
                color:tab===t.id?C.gold:"#555",
                cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:font.body,
                letterSpacing:"0.08em", textTransform:"uppercase", transition:"all 0.15s",
              }}>{t.label}</button>
            ))}
          </div>
          <button onClick={()=>db.auth.signOut()} style={{
            background:"none", border:"none", color:C.dim, fontSize:11, cursor:"pointer",
            fontFamily:font.body, letterSpacing:"0.1em", textTransform:"uppercase", padding:"0 20px",
          }}>Sign Out</button>
        </div>
      </div>
      <div style={{ maxWidth:800, margin:"0 auto", padding:"36px 20px 60px" }}>
        {tab==="plan"&&<PlanTab onEx={setModal}/>}
        {tab==="progress"&&<ProgressTab data={data} onDataChange={handleDataChange} onSave={handleSave}/>}
      </div>
      {modal&&<ExModal name={modal} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
